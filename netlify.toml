# netlify.toml
# No build step needed — plain HTML/CSS/JS site

[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/blog"
  to = "/blog/index.html"
  status = 301

[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 301

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 301

[[redirects]]
  from = "/freebies"
  to = "/freebies.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Custom 404
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
